name: File Checker & Downloader

on:
  schedule:
    # UTC 時間 00:00 = 台灣時間 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 支援手動觸發測試

# 授權寫入權限，解決 git push 403 錯誤
permissions:
  contents: write

jobs:
  check-and-download:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出專案程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴與 Playwright 瀏覽器
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 執行檢查與下載腳本
        run: |
          python scripts/check_and_download.py

      - name: 將下載的檔案提交至 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-download: File Checker & Downloader update" && git push)
